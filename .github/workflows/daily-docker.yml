name: Daily E-commerce Platform Tracker

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily at 00:00 UTC
  workflow_dispatch:     # Allow manual runs from the Actions tab

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ecom-platform-tracker .

      - name: Run tracker inside container
        env:
          # Optional residential proxy for the escalation tier. Set a repo secret
          # named SCRAPER_PROXY (http://user:pass@host:port). If unset, the run
          # proceeds direct — detect_platform.py treats empty as "no proxy".
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e SCRAPER_PROXY \
            ecom-platform-tracker

      - name: Commit and push updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily update: $(date -u +'%Y-%m-%d')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- Deploy to GitHub Pages, but only when data.json actually changed ----
      # The daily push above uses GITHUB_TOKEN, so it can't trigger deploy.yml
      # (GitHub suppresses workflow runs from token pushes). We rebuild here
      # instead, gated on the change flag so unchanged days don't redeploy.
      - name: Set up Node.js LTS
        if: steps.commit.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true'
        run: npm ci

      - name: Build the React app
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
