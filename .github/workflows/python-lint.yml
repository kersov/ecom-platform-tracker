name: Python Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.28"

      - name: Install dev dependencies (from lockfile)
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check .
