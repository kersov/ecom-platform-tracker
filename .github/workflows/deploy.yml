name: Deploy React App to GitHub Pages

# Runs manually, and automatically when a human push changes site-relevant
# files on main (backend/docs-only pushes are excluded via the paths filter).
# NOTE: the daily data update does NOT trigger this — that job pushes with the
# default GITHUB_TOKEN, and GitHub blocks token pushes from starting new
# workflow runs (anti-recursion). Daily auto-deploy is handled directly inside
# daily-docker.yml, gated on data.json actually changing.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
      - 'data.json'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js LTS
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build the React app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
